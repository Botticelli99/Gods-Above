<head>

<body>

<line opacity="0.8" stroke="#C9A84C" stroke-width="1.5" x1="8" x2="16" y1="80" y2="80"></line>
</g>

<path d="M102.6 57.4 L87.2 72.8 L88 80 L94.5 73.5 Z" fill="#C9A84C" opacity="0.4"></path>
<path d="M57.4 102.6 L72.8 87.2 L72 80 L65.5 86.5 Z" fill="#C9A84C" opacity="0.4"></path>
<path d="M102.6 102.6 L87.2 87.2 L88 80 L94.5 86.5 Z" fill="#C9A84C" opacity="0.4"></path>

</svg>
<div class="loading-title">GODS ABOVE</div>
<div class="loading-sub">Univers de Fiction</div>
<div class="loading-bar-wrap">
<div class="loading-bar" id="loading-bar"></div>
</div>
<div class="loading-pct" id="loading-pct">0%</div>
<button class="enter-btn" id="enter-btn" onclick="enterSite()">
      ENTRER DANS L'UNIVERS
    </button>
</div>
</div>
  <nav class="site-nav">
    <a href="#/accueil" class="nav-logo" data-route="accueil">GODS ABOVE</a>
    <ul class="nav-links">
      <li><a href="#/accueil" data-route="accueil">Accueil</a></li>
      <li><a href="#/magie" data-route="magie">Magie</a></li>
      <li><a href="#/race" data-route="race">Race</a></li>
      <li><a href="#/chronologie" data-route="chronologie">Chronologie</a></li>
      <li><a href="#/unite" data-route="unite">Unité</a></li>
    </ul>
    <div class="nav-actions">
      <a href="#/creation" class="nav-btn nav-btn-outline" data-route="creation">Créer mon OC</a>
    </div>
  </nav>

  <main id="ga-app"></main>

  <div class="ga-player" id="gaPlayer">
  <div class="ga-player__head">
    <button class="ga-player__toggle" id="gaToggle" aria-label="Réduire / agrandir le lecteur">
      <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
    </button>
  </div>

  <div class="ga-player__cover" id="gaCover">Aurellon</div>

  <div class="ga-player__row">
    <p class="ga-player__title" id="gaTitle">Titre du morceau</p>

    <div class="ga-player__controls">
      <button class="ga-player__btn" id="gaPrev" aria-label="Précédent">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l10-6v12z"/></svg>
      </button>
      <button class="ga-player__btn ga-player__btn--play" id="gaPlay" aria-label="Lecture / Pause">
        <svg id="gaPlayIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ga-player__btn" id="gaNext" aria-label="Suivant">
        <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM4.5 6l10 6-10 6z"/></svg>
      </button>
    </div>
  </div>

  <p class="ga-player__artist" id="gaArtist">Artiste / Album</p>

  <div class="ga-player__bar">
    <span class="ga-player__time" id="gaCurrent">0:00</span>
    <input type="range" class="ga-player__progress" id="gaProgress" value="0" min="0" max="100" step="0.1">
    <span class="ga-player__time" id="gaDuration">0:00</span>
  </div>

  <div class="ga-player__footer">
    <div class="ga-player__vol">
      <svg viewBox="0 0 24 24"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.7v8.6a4.5 4.5 0 0 0 2.5-4.3z"/></svg>
      <input type="range" id="gaVolume" min="0" max="1" step="0.01" value="0.8">
    </div>
    <span class="ga-player__track-index" id="gaIndex">1 / 1</span>
  </div>

  <audio id="gaAudio" preload="metadata"></audio>
</div>


  <script src="js/router.js"></script>
  <script src="js/loading.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
