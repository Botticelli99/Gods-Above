<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Personnages Marquants — Gods Above</title>
<style>
:root{--void:#0a0908;--stone:#1c1a17;--stone-light:#2b2722;--gold-dim:#8a723f;--gold:#c9a35e;--gold-bright:#e8c873;--parchment:#e5ddc8;--parchment-dim:#9c9484}*{margin:0;padding:0;box-sizing:border-box}body{background:radial-gradient(ellipse at 50% -10%,rgba(201,163,94,.06),transparent 60%),var(--void);color:var(--parchment);font-family:Georgia,'Times New Roman',serif;min-height:100vh;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.35;background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.015) 0,transparent 1px,transparent 3px),repeating-linear-gradient(90deg,rgba(0,0,0,.15) 0,transparent 1px,transparent 3px)}header{position:relative;text-align:center;padding:90px 24px 60px;z-index:1}.eyebrow{font-size:.72rem;font-weight:700;letter-spacing:.45em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:22px}h1{font-weight:900;font-size:clamp(2.4rem,6vw,4.6rem);letter-spacing:.06em;color:var(--gold-bright);text-shadow:0 1px #000,0 0 40px rgba(201,163,94,.18);text-transform:uppercase}header .sub{max-width:600px;margin:24px auto 0;font-size:1.15rem;font-style:italic;color:var(--parchment-dim);line-height:1.6}.divider{width:120px;height:1px;margin:34px auto 0;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);position:relative}.divider:after{content:"✦";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--void);color:var(--gold);font-size:.8rem;padding:0 12px}.filters{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin:50px 0 10px;position:relative;z-index:1;padding:0 20px}.chip{font:700 .68rem system-ui,sans-serif;letter-spacing:.15em;text-transform:uppercase;color:var(--parchment-dim);background:var(--stone);border:1px solid rgba(201,163,94,.25);padding:9px 20px;cursor:pointer;transition:.25s}.chip:hover{border-color:var(--gold);color:var(--gold-bright)}.chip.active{background:var(--gold-dim);color:var(--void);border-color:var(--gold)}.gallery{position:relative;z-index:1;max-width:1280px;margin:60px auto 120px;padding:0 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:36px}.stele{position:relative;aspect-ratio:3/4.3;background:linear-gradient(155deg,var(--stone-light),var(--stone) 60%);border:1px solid rgba(201,163,94,.22);cursor:pointer;overflow:hidden;text-decoration:none;color:inherit;display:block;transition:transform .4s cubic-bezier(.2,.8,.2,1),border-color .4s;clip-path:polygon(0 3%,100% 0,100% 97%,0 100%)}.stele:before{content:"";position:absolute;inset:10px;border:1px solid rgba(201,163,94,.15);pointer-events:none;z-index:3}.stele:hover{transform:translateY(-6px);border-color:var(--gold)}.portrait{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3.6rem;font-weight:700;color:rgba(201,163,94,.14);background:radial-gradient(circle at 50% 35%,rgba(201,163,94,.08),transparent 55%),repeating-linear-gradient(135deg,rgba(0,0,0,.25) 0,rgba(0,0,0,.25) 2px,transparent 2px,transparent 14px);letter-spacing:.05em}.portrait img{width:100%;height:100%;object-fit:cover}.crack{position:absolute;inset:0;width:100%;height:100%;z-index:2;opacity:0;transition:opacity .5s;mix-blend-mode:screen}.stele:hover .crack{opacity:1}.veil{position:absolute;inset:0;z-index:2;background:linear-gradient(0deg,rgba(10,9,8,.96),rgba(10,9,8,.55) 45%,rgba(10,9,8,.15) 75%,transparent)}.info{position:absolute;left:0;right:0;bottom:0;z-index:4;padding:22px}.era-tag{font:700 .58rem system-ui,sans-serif;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);display:block;margin-bottom:8px}.name{font-size:1.15rem;font-weight:700;color:var(--gold-bright);letter-spacing:.03em;line-height:1.3;text-shadow:0 2px 6px #000}.title-role{font-size:.95rem;font-style:italic;color:var(--parchment-dim);margin-top:4px}.empty-gallery{grid-column:1/-1;text-align:center;color:var(--parchment-dim);font-style:italic;padding:50px}footer{text-align:center;padding:0 20px 70px;color:var(--parchment-dim);font:700 .62rem system-ui,sans-serif;letter-spacing:.25em;text-transform:uppercase;position:relative;z-index:1;opacity:.5}[hidden]{display:none!important}@media(max-width:600px){.gallery{padding:0 20px;gap:24px}header{padding:60px 20px 40px}}
</style><style>
body.panel-open{overflow:hidden}.stele{width:100%;padding:0;font:inherit;text-align:left}.stele:focus-visible{outline:2px solid var(--gold-bright);outline-offset:5px}.panel-backdrop{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.72);opacity:0;pointer-events:none;transition:opacity .32s ease;backdrop-filter:blur(3px)}.panel-backdrop.open{opacity:1;pointer-events:auto}.detail-panel{position:fixed;top:0;right:0;z-index:41;width:min(500px,92vw);height:100dvh;overflow:auto;background:linear-gradient(145deg,#242019,#100f0d 58%);border-left:1px solid rgba(201,163,94,.45);box-shadow:-25px 0 70px rgba(0,0,0,.55);transform:translateX(105%);visibility:hidden;transition:transform .4s cubic-bezier(.2,.8,.2,1),visibility 0s .4s}.detail-panel.open{transform:none;visibility:visible;transition-delay:0s}.panel-close{position:fixed;top:16px;right:18px;z-index:2;width:42px;height:42px;border:1px solid rgba(232,200,115,.45);border-radius:50%;background:rgba(10,9,8,.8);color:var(--gold-bright);font-size:1.15rem;cursor:pointer}.panel-close:hover,.panel-close:focus-visible{background:var(--gold);color:var(--void);outline:0}.panel-body{min-height:100%}.panel-hero{width:100%;height:min(42vh,360px);display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle,rgba(201,163,94,.16),transparent 65%),#15130f;color:rgba(201,163,94,.3)}.panel-hero img{width:100%;height:100%;object-fit:cover}.panel-initials{font-size:5rem;font-weight:700;letter-spacing:.08em}.panel-copy{padding:32px 34px 48px}.panel-era{display:block;margin-bottom:9px;color:var(--gold-dim);font:700 .66rem system-ui,sans-serif;letter-spacing:.2em;text-transform:uppercase}.panel-name{color:var(--gold-bright);font-size:clamp(1.8rem,6vw,2.65rem);line-height:1.08;text-transform:none;letter-spacing:.02em;text-shadow:none}.panel-role{margin-top:8px;color:var(--parchment-dim);font-size:1.14rem;font-style:italic}.panel-bio{margin-top:24px;color:var(--parchment);font-size:1.02rem;line-height:1.72;white-space:pre-line}.panel-facts{display:grid;grid-template-columns:max-content 1fr;gap:8px 18px;margin-top:26px;padding:18px 0;border-top:1px solid rgba(201,163,94,.22);border-bottom:1px solid rgba(201,163,94,.22)}.panel-facts dt{color:var(--gold-dim);font:700 .68rem system-ui,sans-serif;letter-spacing:.09em;text-transform:uppercase}.panel-facts dd{color:var(--parchment);margin:0}.panel-quote{margin-top:25px;padding-left:18px;border-left:2px solid var(--gold-dim);color:var(--gold-bright);font-size:1.08rem;font-style:italic;line-height:1.55}.panel-link{display:inline-block;margin-top:28px;padding:11px 16px;border:1px solid var(--gold-dim);color:var(--gold-bright);font:700 .73rem system-ui,sans-serif;letter-spacing:.1em;text-decoration:none;text-transform:uppercase}.panel-link:hover{background:var(--gold-dim);color:var(--void)}@media(max-width:600px){.detail-panel{width:100vw}.panel-copy{padding:26px 23px 42px}.panel-hero{height:38vh}}@media(prefers-reduced-motion:reduce){.detail-panel,.panel-backdrop{transition:none}}
</style></head><body>
<header><div class="eyebrow">Aurellon · Mémoire du Monde</div><h1>Personnages Marquants</h1><p class="sub">Ceux dont les actes ont gravé l&#39;histoire d&#39;Aurellon, en bien comme en mal. Certains sont vénérés, d&#39;autres maudits — tous sont restés.</p><div class="divider"></div></header>
<nav class="filters" aria-label="Filtrer par ère"><button class="chip active" data-era="all">Toutes les ères</button><button class="chip" data-era="1">Ère I</button><button class="chip" data-era="2">Ère II</button><button class="chip" data-era="3">Ère III</button><button class="chip" data-era="4">Ère IV</button><button class="chip" data-era="5">Ère V</button></nav>
<main class="gallery" id="gallery"></main><div class="panel-backdrop" id="panelBackdrop"></div><aside class="detail-panel" id="detailPanel" aria-hidden="true" aria-label="Détails du personnage"><button class="panel-close" id="panelClose" type="button" aria-label="Fermer le panneau">✕</button><div class="panel-body" id="panelBody"></div></aside><footer>Gods Above — Aurellon</footer>
<script id="character-data" type="application/json">{"meta":{"eyebrow":"Aurellon · Mémoire du Monde","title":"Personnages Marquants","subtitle":"Ceux dont les actes ont gravé l'histoire d'Aurellon, en bien comme en mal. Certains sont vénérés, d'autres maudits — tous sont restés.","footer":"Gods Above — Aurellon"},"characters":[{"id":"4b5873d1-f570-4941-991b-eb386c582883","name":"Gizard","role":"","bio":"Gizard fut l'un des principaux créateur du système de classement moderne de la magie, il forma de nombreuse école de magie à travers le pays et eu comme maitre un néo-gods","era":"1","eraLabel":"Ère I","origin":"","status":"","affiliation":"","quote":"","link":"","image":"pages/personnages/gizard.png"}]}</script><script>
(() => {
  const data=JSON.parse(document.getElementById('character-data').textContent);
  const gallery=document.getElementById('gallery'),panel=document.getElementById('detailPanel'),backdrop=document.getElementById('panelBackdrop'),panelBody=document.getElementById('panelBody'),closeButton=document.getElementById('panelClose');
  const cracks=['M120 0 L100 90 L140 160 L90 220 L120 340','M40 0 L80 100 L50 180 L100 260 L70 340','M200 0 L160 80 L190 150 L150 240 L180 340','M120 0 L150 100 L110 170 L150 250 L110 340','M60 0 L100 90 L60 160 L110 230 L80 340','M180 0 L140 90 L170 160 L120 230 L150 340'];
  const initials=n=>String(n||'?').trim().split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
  const safeUrl=(url,fallback)=>{try{const v=String(url||'').trim();if(!v)return fallback;if(/^(javascript|vbscript):/i.test(v))return fallback;return v}catch(e){return fallback}};
  const add=(tag,cls,text)=>{const el=document.createElement(tag);if(cls)el.className=cls;if(text!==undefined)el.textContent=text;return el};
  let lastFocus=null;
  function openPanel(p){
    panelBody.innerHTML='';const hero=add('div','panel-hero');
    if(p.image){const img=document.createElement('img');img.src=safeUrl(p.image,'');img.alt=p.name||'';hero.appendChild(img)}else hero.appendChild(add('span','panel-initials',initials(p.name)));
    const copy=add('div','panel-copy');copy.append(add('span','panel-era',p.eraLabel||''),add('h2','panel-name',p.name||'Sans nom'));
    if(p.role)copy.appendChild(add('p','panel-role',p.role));if(p.bio)copy.appendChild(add('p','panel-bio',p.bio));
    const facts=add('dl','panel-facts');const fact=(label,value)=>{if(!value)return;facts.append(add('dt','',label),add('dd','',value));};fact('Origine',p.origin);fact('Affiliation',p.affiliation);fact('Statut',p.status);if(facts.children.length)copy.appendChild(facts);
    if(p.quote)copy.appendChild(add('blockquote','panel-quote','« '+p.quote+' »'));
    if(p.link){const link=add('a','panel-link','Voir la fiche complète');link.href=safeUrl(p.link,'#');copy.appendChild(link);}
    panelBody.append(hero,copy);lastFocus=document.activeElement;panel.classList.add('open');backdrop.classList.add('open');panel.setAttribute('aria-hidden','false');document.body.classList.add('panel-open');closeButton.focus();
  }
  function closePanel(){panel.classList.remove('open');backdrop.classList.remove('open');panel.setAttribute('aria-hidden','true');document.body.classList.remove('panel-open');if(lastFocus&&lastFocus.focus)lastFocus.focus();}
  data.characters.forEach((p,i)=>{
    const card=add('button','stele');card.type='button';card.dataset.era=p.era||'';card.setAttribute('aria-label','Découvrir '+(p.name||'ce personnage'));
    const portrait=add('div','portrait');if(p.image){const img=document.createElement('img');img.src=safeUrl(p.image,'');img.alt='';portrait.appendChild(img)}else portrait.textContent=initials(p.name);
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('class','crack');svg.setAttribute('viewBox','0 0 240 340');svg.setAttribute('preserveAspectRatio','none');svg.setAttribute('aria-hidden','true');const path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',cracks[i%cracks.length]);path.setAttribute('stroke','#e8c873');path.setAttribute('stroke-width','1.2');path.setAttribute('fill','none');path.setAttribute('opacity','.8');svg.appendChild(path);
    const info=add('div','info');info.append(add('span','era-tag',p.eraLabel||''),add('div','name',p.name||'Sans nom'),add('div','title-role',p.role||''));card.append(portrait,svg,add('div','veil'),info);card.addEventListener('click',()=>openPanel(p));gallery.appendChild(card);
  });
  if(!data.characters.length)gallery.appendChild(add('p','empty-gallery','Aucun personnage n’a encore été ajouté.'));
  document.querySelectorAll('.chip').forEach(chip=>chip.addEventListener('click',()=>{document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');document.querySelectorAll('.stele').forEach(s=>s.hidden=!(chip.dataset.era==='all'||s.dataset.era===chip.dataset.era));}));
  closeButton.addEventListener('click',closePanel);backdrop.addEventListener('click',closePanel);document.addEventListener('keydown',event=>{if(event.key==='Escape'&&panel.classList.contains('open'))closePanel();});
})();</script></body></html>
